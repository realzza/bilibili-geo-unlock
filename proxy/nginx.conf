# HTTPS reverse proxy for the macOS Bilibili userscript.
#
# Run this only on infrastructure you control in an appropriate region. The
# narrow allowlist below prevents this virtual host from becoming a generic
# proxy. Replace the domain and certificate paths before enabling it.

server {
    listen 80;
    server_name your.proxy.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your.proxy.example.com;

    ssl_certificate     /etc/letsencrypt/live/your.proxy.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your.proxy.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location = /healthz {
        default_type text/plain;
        add_header Access-Control-Allow-Origin "https://www.bilibili.com" always;
        add_header Cache-Control "no-store" always;
        return 200 "bilibili-geo-unlock proxy: ok\n";
    }

    # Current and legacy PGC player endpoints, plus the optional season data
    # endpoint. Keep this list narrow; it is deliberately not location /.
    location ~ ^/pgc/(player/(web/(v2/)?|api/)playurl|view/web/(simple/)?season)$ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "https://www.bilibili.com" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "content-type" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Cache-Control "no-store" always;
            return 204;
        }
        if ($request_method != GET) { return 405; }

        proxy_pass https://api.bilibili.com;
        proxy_ssl_server_name on;
        proxy_ssl_name api.bilibili.com;
        proxy_set_header Host api.bilibili.com;
        proxy_set_header Referer https://www.bilibili.com/;
        proxy_set_header Origin https://www.bilibili.com;
        proxy_set_header User-Agent $http_user_agent;
        # Never forward cookies scoped to this proxy host upstream.
        proxy_set_header Cookie "";

        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "https://www.bilibili.com" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "content-type" always;
        add_header Cache-Control "no-store" always;
        add_header Vary "Origin" always;
    }

    location / {
        default_type application/json;
        return 404 '{"code":-404,"message":"not found"}';
    }
}
