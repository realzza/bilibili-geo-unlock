# Reverse proxy for Bilibili geo-unlock.
# Deploy this on a VPS located in an unblocked region (Hong Kong / Taiwan /
# mainland China). It mirrors api.bilibili.com and adds the CORS headers the
# userscript needs. Then set the userscript's "Server" to https://<this host>.
#
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS is required (the userscript only talks https). Use certbot / Let's Encrypt:
#   sudo certbot --nginx -d your.proxy.example.com

server {
    listen 80;
    server_name your.proxy.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your.proxy.example.com;

    # --- TLS (replace with your real cert paths) ---
    ssl_certificate     /etc/letsencrypt/live/your.proxy.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your.proxy.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Resolver so nginx can look up the upstream hostname.
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    location / {
        # Handle CORS preflight from www.bilibili.com.
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "https://www.bilibili.com" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "*" always;
            add_header Access-Control-Max-Age 86400;
            return 204;
        }

        set $upstream "api.bilibili.com";
        proxy_pass https://$upstream;
        proxy_ssl_server_name on;
        proxy_ssl_name api.bilibili.com;

        proxy_set_header Host api.bilibili.com;
        proxy_set_header Referer https://www.bilibili.com;
        proxy_set_header Origin https://www.bilibili.com;
        proxy_set_header User-Agent $http_user_agent;
        # Forward the client cookie so your own 大会员 session is used.
        proxy_set_header Cookie $http_cookie;

        # Strip upstream CORS so ours below is the only one (no duplicates).
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        add_header Access-Control-Allow-Origin  "https://www.bilibili.com" always;
        add_header Access-Control-Allow-Credentials "true" always;
    }
}
